name: Daily README update (direct to main)

on:
  schedule:
    - cron: "15 10 * * *" # daily UTC
  workflow_dispatch: {}

# Opt into Node.js 24 now (avoids the Node 20 deprecation warning later)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update README daily section
        run: |
          python3 - << 'PY'
          import re, datetime
          from pathlib import Path

          # Support both README.md and readme.md
          candidates = [Path("README.md"), Path("readme.md")]
          readme = next((p for p in candidates if p.exists()), None)

          # If no README exists, create README.md
          if not readme:
            readme = Path("README.md")
            readme.write_text("# Project\n\n", encoding="utf-8")

          txt = readme.read_text(encoding="utf-8")

          # Ensure markers exist
          if "<!-- DAILY:START -->" not in txt or "<!-- DAILY:END -->" not in txt:
            txt = txt.rstrip() + "\n\n## Daily update\n\n<!-- DAILY:START -->\n_Last updated: (automation will fill this)_\n<!-- DAILY:END -->\n"

          now = datetime.datetime.utcnow().strftime("%Y-%m-%d %H:%M UTC")
          new_block = "\n".join([
            f"_Last updated: {now}_",
            "",
            "- Automated daily refresh via GitHub Actions."
          ])

          # Correct regex (note the closing parenthesis)
          pattern = r"(<!-- DAILY:START -->)(.*?)(<!-- DAILY:END -->)"
          def repl(m):
            return f"{m.group(1)}\n{new_block}\n{m.group(3)}"

          new_txt, n = re.subn(pattern, repl, txt, flags=re.S)
          if n == 0:
            raise SystemExit("Could not update DAILY block (unexpected).")

          readme.write_text(new_txt, encoding="utf-8")
          print(f"Updated {readme}")
          PY

      - name: Commit & push to main
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Avoid pathspec errors by adding only files that exist
          [ -f README.md ] && git add README.md
          [ -f readme.md ] && git add readme.md
          [ -f .github/workflows/daily-readme.yml ] && git add .github/workflows/daily-readme.yml

          # If nothing is staged, exit cleanly
          if git diff --cached --quiet; then
            echo "Nothing staged; exiting."
            exit 0
          fi

          git commit -m "chore: daily README update"
          git push
